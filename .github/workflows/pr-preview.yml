name: PR – lint, build, preview

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lint-build-preview:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Check Firebase secret
        id: firebase
        env:
          FB_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SACRAMENTALMEETING }}
        run: |
          if [ -n "$FB_SA" ]; then
            echo "has_secret=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_secret=false" >> "$GITHUB_OUTPUT"
            echo "::warning::FIREBASE_SERVICE_ACCOUNT_SACRAMENTALMEETING not configured; skipping preview deploy."
          fi

      - name: Deploy to Firebase Hosting preview channel
        if: steps.firebase.outputs.has_secret == 'true' && github.event.pull_request.head.repo.full_name == github.repository
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SACRAMENTALMEETING }}
          projectId: sacramentalmeeting
          expires: 7d

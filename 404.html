<!DOCTYPE html>

      .card h1 { font-size: 56px; font-weight: 700; color: #1B3A6B; margin: 0 0 8px; }
      .card h2 { font-size: 18px; font-weight: 400; color: #555; margin: 0 0 20px; }
      .card p { font-size: 14px; color: #777; line-height: 1.5; margin: 0 0 24px; }
      .card a { display: inline-block; background: #1B3A6B; color: #fff; text-decoration: none; padding: 12px 28px; border-radius: 4px; font-size: 14px; }
      .card a:hover { background: #15305a; }
      @media (max-width: 600px) { body { background: #fff; } .card { margin-top: 0; box-shadow: none; } }

  </head>
